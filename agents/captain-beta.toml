# Captain Beta: Secondary orchestration captain for DolphinSense fleet
data_dir = "~/.dolphin-milk-captain-beta"

[wallet]
url = "http://localhost:3323"
origin = "http://localhost"
timeout = 120

[budget]
max_per_task = 50_000_000
max_per_hour = 100_000_000
max_per_day = 400_000_000
low_power_threshold = 100_000
staging_threshold = 1_000_000
enforcement = "strict"

[llm]
default_provider = "claude-chat"
default_model = "claude-opus-4-6"
max_tokens = 16384
context_window = 200000
max_history_turns = 60
min_recent_messages = 8
compaction_enabled = true
compaction_threshold = 0.75

[logging]
level = "INFO"
format = "json"

[memory]
base_dir = "memory"
maintenance_enabled = true
maintenance_interval_secs = 1800

[heartbeat]
enabled = true
inbox_poll_secs = 60
max_concurrent_tasks = 5
reflection_enabled = false

[certificates]
agent_name = "captain-beta"
certificate_type = "agent-authorization"

[browser]
enabled = false

[lifecycle]
auto_sweep_enabled = true
sweep_interval_minutes = 30

[compliance]
enabled = true
worm_mode = true
regulations = ["hackathon-audit"]

[server]
openai_compat_enabled = false

[tools]
deferral_mode = "auto"
auto_threshold_pct = 40

[overlay]
enabled = true
submit_url = "https://rust-overlay.dev-a3e.workers.dev"
endpoint = "http://localhost:3002"
capabilities = ["orchestration", "intelligence", "reporting"]
agent_name = "Captain Beta"

system_prompt_file = "../prompts/captain.md"
