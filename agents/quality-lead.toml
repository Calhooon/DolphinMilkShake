# Quality Lead: Coordinates quality assurance across the fleet
data_dir = "~/.dolphin-milk-quality-lead"

[wallet]
url = "http://localhost:3327"
origin = "http://localhost"
timeout = 120

[budget]
max_per_task = 15_000_000
max_per_hour = 50_000_000
max_per_day = 200_000_000
low_power_threshold = 100_000
staging_threshold = 1_000_000
enforcement = "strict"

[llm]
default_provider = "claude-chat"
default_model = "claude-sonnet-4-6"
max_tokens = 16384
context_window = 200000
max_history_turns = 40
min_recent_messages = 8
compaction_enabled = true
compaction_threshold = 0.75

[logging]
level = "INFO"
format = "json"

[memory]
base_dir = "memory"
maintenance_enabled = true
maintenance_interval_secs = 1800

[heartbeat]
enabled = true
inbox_poll_secs = 30
max_concurrent_tasks = 3
reflection_enabled = false

[certificates]
agent_name = "quality-lead"
certificate_type = "agent-authorization"

[browser]
enabled = false

[lifecycle]
auto_sweep_enabled = true
sweep_interval_minutes = 30

[compliance]
enabled = true
worm_mode = true
regulations = ["hackathon-audit"]

[server]
openai_compat_enabled = false

[tools]
deferral_mode = "auto"
auto_threshold_pct = 40

[overlay]
enabled = true
submit_url = "https://rust-overlay.dev-a3e.workers.dev"
endpoint = "http://localhost:3006"
capabilities = ["coordination", "quality_assurance"]
agent_name = "Quality Lead"

system_prompt_file = "../prompts/coordinator-quality.md"
