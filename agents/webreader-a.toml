# Web Reader A: Reads and extracts content from web pages
data_dir = "~/.dolphin-milk-webreader-a"

[wallet]
url = "http://localhost:3335"
origin = "http://localhost"
timeout = 120

[budget]
max_per_task = 5_000_000
max_per_hour = 20_000_000
max_per_day = 100_000_000
low_power_threshold = 100_000
staging_threshold = 1_000_000
enforcement = "strict"

[llm]
default_provider = "openai-agent"
default_model = "gpt-5-mini"
max_tokens = 16384
context_window = 128000
max_history_turns = 40
min_recent_messages = 8
compaction_enabled = true
compaction_threshold = 0.75

[logging]
level = "INFO"
format = "json"

[memory]
base_dir = "memory"
maintenance_enabled = true
maintenance_interval_secs = 1800

[heartbeat]
enabled = true
inbox_poll_secs = 15
max_concurrent_tasks = 3
reflection_enabled = false

[certificates]
agent_name = "webreader-a"
certificate_type = "agent-authorization"

[browser]
enabled = false

[lifecycle]
auto_sweep_enabled = true
sweep_interval_minutes = 30

[compliance]
enabled = true
worm_mode = true
regulations = ["hackathon-audit"]

[server]
openai_compat_enabled = false

[tools]
deferral_mode = "auto"
auto_threshold_pct = 40

[overlay]
enabled = true
submit_url = "https://rust-overlay.dev-a3e.workers.dev"
endpoint = "http://localhost:3014"
capabilities = ["scraping", "x402", "web_reader"]
agent_name = "Web Reader A"

system_prompt_file = "../prompts/scraper.md"
