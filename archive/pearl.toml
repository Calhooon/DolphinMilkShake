# Pearl: Content Creation & Report Writing Specialist
# Writes reports, creates visualizations, produces final deliverables.
# Uses Claude for higher quality prose.

data_dir = "~/.dolphin-milk-pearl"

[wallet]
url = "http://localhost:3325"
origin = "http://localhost"
timeout = 30

[budget]
max_per_task = 20_000_000     # 20M sats per task (long-form writing)
max_per_hour = 80_000_000
max_per_day = 300_000_000
low_power_threshold = 50_000
staging_threshold = 500_000
enforcement = "strict"

[llm]
default_provider = "claude-chat"
default_model = "claude-sonnet-4-6"
max_tokens = 16384
context_window = 200_000
max_history_turns = 50
min_recent_messages = 10
compaction_enabled = true
compaction_threshold = 0.8

[logging]
level = "INFO"
format = "json"

[memory]
base_dir = "memory"
maintenance_enabled = true
maintenance_interval_secs = 3600

[heartbeat]
enabled = true
inbox_poll_secs = 30
max_concurrent_tasks = 2        # Fewer concurrent -- writing needs focus
reflection_enabled = true
reflection_interval_secs = 300
reflection_model = "claude-haiku-4-5-20251001"
reflection_max_iterations = 3
checklist_cooldown_secs = 600

[heartbeat.active_hours]
start = "06:00"
end = "23:00"
timezone = "America/New_York"

[certificates]
agent_name = "pearl"
certificate_type = "agent-authorization"

[browser]
enabled = false    # Pearl doesn't browse -- it creates content

[lifecycle]
auto_sweep_enabled = true
sweep_interval_minutes = 60
verify_interval = 10
consistency_check_interval = 5

[compliance]
enabled = true
worm_mode = true
regulations = ["hackathon-audit"]
default_retention_days = 90

[server]
openai_compat_enabled = false

[tools]
deferral_mode = "auto"
auto_threshold_pct = 50

# --- Overlay integration (rust-bsv-worm#309) ---
[overlay]
enabled = true
submit_url = "https://rust-overlay.dev-a3e.workers.dev"
endpoint = "http://localhost:3004"
capabilities = ["content-creation", "report-writing", "visualization", "editing"]
agent_name = "Pearl"
description = "Content creation, report writing, and visualization specialist"

# --- System prompt ---
system_prompt_file = "../prompts/pearl.md"
