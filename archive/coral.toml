# Coral: Web Scraping & Data Collection Specialist
# Fetches web pages, extracts structured data, finds sources.
# Browser automation enabled for dynamic content.

data_dir = "~/.dolphin-milk-coral"

[wallet]
url = "http://localhost:3323"
origin = "http://localhost"
timeout = 30

[budget]
max_per_task = 10_000_000     # 10M sats per task (scraping is cheaper)
max_per_hour = 50_000_000
max_per_day = 200_000_000
low_power_threshold = 50_000
staging_threshold = 500_000
enforcement = "strict"

[llm]
default_provider = "openai-agent"
default_model = "gpt-5-mini"
max_tokens = 8192
context_window = 128_000
max_history_turns = 30
min_recent_messages = 6
compaction_enabled = true
compaction_threshold = 0.8

[logging]
level = "INFO"
format = "json"

[memory]
base_dir = "memory"
maintenance_enabled = true
maintenance_interval_secs = 3600

[heartbeat]
enabled = true
inbox_poll_secs = 15            # Poll faster -- scraping tasks arrive frequently
max_concurrent_tasks = 4
reflection_enabled = false      # Scraper doesn't need reflection
checklist_cooldown_secs = 600

[heartbeat.active_hours]
start = "00:00"
end = "23:59"
timezone = "America/New_York"

[certificates]
agent_name = "coral"
certificate_type = "agent-authorization"

[browser]
enabled = true
headless = true
page_load_timeout = 45          # Longer timeout for slow sites
default_wait_ms = 1500
max_pages = 5
viewport_width = 1280
viewport_height = 720

[lifecycle]
auto_sweep_enabled = true
sweep_interval_minutes = 60
verify_interval = 10
consistency_check_interval = 5

[compliance]
enabled = true
worm_mode = true
regulations = ["hackathon-audit"]
default_retention_days = 90

[server]
openai_compat_enabled = false

[tools]
deferral_mode = "auto"
auto_threshold_pct = 50

# --- Overlay integration (rust-bsv-worm#309) ---
[overlay]
enabled = true
submit_url = "https://rust-overlay.dev-a3e.workers.dev"
endpoint = "http://localhost:3002"
capabilities = ["web-scraping", "data-collection", "source-finding", "content-extraction"]
agent_name = "Coral"
description = "Web scraping and data collection specialist"

# --- System prompt ---
system_prompt_file = "../prompts/coral.md"
