        phase: f.phase,
        from_name: f.from_name,
        to_name: f.to_name,
        amount_sats: f.amount_sats || null,
        ts: f.ts,
      }));

      // Feeder health
      if (snap.feederHealth) state.feederHealth = snap.feederHealth;

      // Articles — replace list
      if (Array.isArray(snap.articles)) {
        state.historical.articlesList = snap.articles;
      }

      // Trigger all renders. Surgical DOM update under the hood.
      renderTotals();
      renderProgress();
      renderLanes();
      renderTxStream();
      renderActivity();
      renderFeeder();
      renderArticles();
    }
    function renderActivity() { renderDirty.activity = true; scheduleRender(); }

    // Custom tx stream renderer for snapshot mode — full replace of the
    // panel body from state.live.txStream. Doesn't touch the rate window
    // (snapshot mode doesn't track rate yet — can be added later by
    // deriving from tx timestamps in the snap).
    function doRenderTxStreamSnapshot() {
      const liveBody = document.getElementById('tx-stream');
      if (!liveBody) return;
      const items = state.live.txStream || [];
      if (items.length === 0) {
        if (!liveBody.querySelector('.empty')) {
          liveBody.innerHTML = '<div class="empty">waiting for live txs…</div>';
        }
        return;
      }
      liveBody.innerHTML = items.map((t) => `
        <div class="tx-item">
          <span class="lane-tag">${t.lane}</span>
          <span class="txid">${t.txid.slice(0,10)}…${t.txid.slice(-8)}</span>
        </div>
      `).join('');
      const txCountEl = document.getElementById('tx-count');
      if (txCountEl) txCountEl.textContent = fmt(items.length);
    }

    // ---------------------------------------------------------------
    // SSE connection
    // ---------------------------------------------------------------
    function connect() {
      const status = document.getElementById('status');
      const statusText = document.getElementById('status-text');
      statusText.textContent = 'connecting…';
      status.classList.remove('live');

      const src = new EventSource('/events');

      src.onopen = () => {
        statusText.textContent = 'live';
        status.classList.add('live');
      };

      src.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        // Snapshot mode: ONLY listen for kind:'snapshot'. Ignore all
        // legacy delta events. The server is the single source of truth.
        if (USE_SNAPSHOT_MODE) {
          if (msg.kind === 'snapshot') applySnapshot(msg.state);
          return;
        }

        switch (msg.kind) {
          case 'init':
            handleInit(msg);
            break;
          case 'init_historical':
            handleInitHistorical(msg);
            break;
          case 'feeder_health':
            handleFeederHealth(msg.data);
            break;
          case 'agent':
            handleAgentEvent(msg.lane, msg.role, msg.ev);
            break;
          case 'proof_emitted':
            handleProofEmitted(msg);
            break;
          case 'cycle_aggregate':
            handleCycleAggregate(msg);
            break;
          case 'wallet_health':
            handleWalletHealth(msg.updates || []);
            break;
          case 'feeder':
            handleFeederEvent(msg.ev);
            break;
          case 'message_flow':
            handleMessageFlow(msg);
            break;
        }
      };

      src.onerror = () => {
        statusText.textContent = 'reconnecting…';
        status.classList.remove('live');
        src.close();
        setTimeout(connect, 2000);
      };
    }

    // Kick off
    setupTabs();
    connect();

    // Tick the "X seconds ago" labels once per second. Both the per-lane
    // last-delegate indicator and the activity feed's .ago spans need
    // their text to age even when no new events arrive.
    setInterval(() => {
      if (state.lanes.size > 0) renderLanes();
      if ((state.activity || []).length > 0) {
        renderDirty.activity = true;
        scheduleRender();
      }
    }, 1000);
  </script>
</body>
</html>
