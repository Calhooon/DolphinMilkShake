<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🐬 DolphinSense · Mission Control</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐬%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Core palette — deep midnight navy with a touch of violet in the shadows.
         Surface levels step up 4-5% luminance each for clean depth hierarchy. */
      --bg:         #070a14;
      --bg-tint:    #0c1122;
      --surface:    #0f1426;
      --surface-1:  #141a30;
      --surface-2:  #1a2138;
      --surface-3:  #222a44;
      --border:     #232b45;
      --border-strong: #2e3855;

      /* Text hierarchy */
      --text:       #eef1fb;
      --text-dim:   #b8bfd4;
      --muted:      #7a849e;
      --muted-soft: #5a6580;

      /* Semantic — fleet grade, each tuned against #070a14 for AA contrast */
      --accent:     #5cf2a4;     /* mint — primary live */
      --accent-2:   #7ab7ff;     /* azure — secondary */
      --accent-3:   #c5a3ff;     /* violet — tertiary / captain */
      --warn:       #ffcb5c;
      --bad:        #ff7a82;
      --good:       #5cf2a4;

      /* Role accents — harmonized hues, not clashing */
      --captain:    #c5a3ff;
      --worker:     #5cf2a4;
      --synthesis:  #7ab7ff;

      /* Gradients */
      --grad-primary:   linear-gradient(135deg, #5cf2a4 0%, #7ab7ff 50%, #c5a3ff 100%);
      --grad-progress:  linear-gradient(90deg, #5cf2a4 0%, #7ab7ff 60%, #c5a3ff 100%);
      --grad-surface:   linear-gradient(145deg, #141a30 0%, #0f1426 100%);
      --grad-live:      linear-gradient(90deg, rgba(92, 242, 164, 0.12), rgba(122, 183, 255, 0.04));

      /* Shadows — elevation system */
      --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md:  0 4px 16px rgba(0, 0, 0, 0.35), 0 2px 4px rgba(0, 0, 0, 0.25);
      --shadow-lg:  0 12px 32px rgba(0, 0, 0, 0.45), 0 4px 8px rgba(0, 0, 0, 0.3);
      --glow-accent: 0 0 20px rgba(92, 242, 164, 0.25);
      --glow-captain: 0 0 16px rgba(197, 163, 255, 0.22);

      /* Rhythm */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-pill: 999px;

      /* Motion */
      --ease-out-quart: cubic-bezier(0.165, 0.84, 0.44, 1);
      --ease-out-expo:  cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* Accessibility + sanity defaults */
    * { box-sizing: border-box; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--radius-sm); }
    ::selection { background: rgba(92, 242, 164, 0.3); color: var(--text); }

    /* Dark-mode scrollbars — subtle, thin, consistent */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: var(--radius-pill); border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); background-clip: padding-box; border: 2px solid transparent; }
    * { scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent; }

    html, body {
      background:
        radial-gradient(1200px 800px at 15% -10%, rgba(92, 242, 164, 0.06) 0%, transparent 60%),
        radial-gradient(1000px 700px at 100% 0%, rgba(122, 183, 255, 0.05) 0%, transparent 55%),
        radial-gradient(900px 600px at 50% 110%, rgba(197, 163, 255, 0.05) 0%, transparent 55%),
        var(--bg);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-feature-settings: "tnum", "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    /* Mission Control layout: fixed-viewport "holy grail" dashboard.
       Top strip (title/counters + progress + feeder) is fixed height; the
       remaining viewport is split into lanes (flexible) and sidebar (380px).
       Body itself never scrolls — only inner panels do. */
    body {
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      grid-template-areas:
        "header  header"
        "progress progress"
        "feeder  feeder"
        "lanes   sidebar";
      gap: 12px;
      height: 100vh;
      overflow: hidden;
    }
    header        { grid-area: header; }
    .progress-row { grid-area: progress; }
    .feeder-bar   { grid-area: feeder; }
    .lanes        { grid-area: lanes;   min-height: 0; overflow-y: auto; }
    .right-panel  { grid-area: sidebar; min-height: 0; }

    /* Ultrawide — give sidebar more breathing room */
    @media (min-width: 1800px) {
      body {
        grid-template-columns: minmax(0, 1fr) 440px;
        gap: 16px;
        padding: 18px;
      }
    }

    /* Tablet — stack sidebar below lanes so lanes get full width */
    @media (max-width: 1100px) {
      body {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto auto auto minmax(320px, 1fr) minmax(260px, auto);
        grid-template-areas:
          "header"
          "progress"
          "feeder"
          "lanes"
          "sidebar";
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }
      .right-panel { flex-direction: row; }
      .right-panel .panel { flex: 1; }
    }

    /* Mobile — tighter padding, sidebar panels stack again */
    @media (max-width: 720px) {
      body { padding: 10px; gap: 10px; }
      .right-panel { flex-direction: column; }
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 22px;
      background: var(--grad-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      animation: fade-in-up 0.6s var(--ease-out-expo) both;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(92, 242, 164, 0.06), transparent);
      transform: translateX(-100%);
      animation: header-shine 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes header-shine {
      0%, 90%, 100% { transform: translateX(-100%); }
      45% { transform: translateX(100%); }
    }
    header h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1::before {
      content: '🐬';
      font-size: 28px;
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 0 16px rgba(92, 242, 164, 0.4));
    }
    header h1 .subtitle {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      -webkit-text-fill-color: var(--muted);
      margin-left: 2px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }
    header .counters { display: flex; gap: 32px; margin-left: auto; align-items: flex-end; }
    header .counter { text-align: right; }
    header .counter .num {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.01em;
      display: block;
    }
    header .counter .num .unit {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-left: 3px;
    }
    header .counter.primary .num {
      font-size: 32px;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    header .counter .lbl {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-top: 4px;
      display: block;
    }
    header .counter .lbl .delta {
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    .progress-row { grid-column: 1 / -1; animation: fade-in-up 0.6s 0.1s var(--ease-out-expo) both; }
    .progress-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      height: 42px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }
    .progress-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--grad-progress);
      width: 0%;
      transition: width 0.8s var(--ease-out-quart);
      box-shadow: 0 0 24px rgba(92, 242, 164, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.3) 50%,
        transparent 100%);
      transform: translateX(-100%);
      animation: progress-shimmer 3s ease-in-out infinite;
    }
    @keyframes progress-shimmer {
      0%, 100% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
    }
    .progress-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      z-index: 1;
      letter-spacing: 0.01em;
    }
    .progress-label .pct {
      color: var(--bg);
      background: rgba(255, 255, 255, 0.96);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    header .status-pill {
      padding: 8px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      transition: all 0.3s var(--ease-out-quart);
    }
    header .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bad);
      box-shadow: 0 0 8px rgba(255, 122, 130, 0.6);
    }
    header .status-pill.live {
      color: var(--accent);
      border-color: rgba(92, 242, 164, 0.35);
      background: rgba(92, 242, 164, 0.08);
    }
    header .status-pill.live .dot {
      background: var(--accent);
      box-shadow: 0 0 12px rgba(92, 242, 164, 0.8);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.85); } }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feeder-bar {
      padding: 10px 16px;
      background: var(--grad-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      animation: fade-in-up 0.6s 0.2s var(--ease-out-expo) both;
    }
    .feeder-bar .lbl {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .feeder-bar .sub {
      padding: 5px 11px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .feeder-bar .sub:hover { border-color: var(--border-strong); background: var(--surface-3); }
    .feeder-bar .sub .name { color: var(--accent-2); font-weight: 700; letter-spacing: 0.01em; }
    .feeder-bar .sub .rate { color: var(--accent); font-weight: 600; }
    .feeder-bar .sub .queued { color: var(--muted); font-weight: 500; }
    .feeder-bar .sub .queued::before { content: 'Q '; color: var(--muted-soft); }

    .lanes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      grid-auto-rows: min-content;
      gap: 12px;
      padding-right: 6px;
      align-content: start;
      /* Stable scrollbar gutter so appearing/disappearing scrollbar doesn't
         shift the whole grid. */
      scrollbar-gutter: stable;
    }
    /* On wide mission-control displays we lock to 5 fixed columns so lanes
       line up visually regardless of tile content height. auto-fit falls
       back gracefully below this breakpoint. */
    @media (min-width: 1280px) {
      .lanes { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .lanes { grid-template-columns: 1fr; }
    }
    .lane {
      background: var(--grad-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s var(--ease-out-quart),
                  border-color 0.25s var(--ease-out-quart),
                  box-shadow 0.25s var(--ease-out-quart);
      box-shadow: var(--shadow-sm);
      animation: lane-in 0.5s var(--ease-out-expo) both;
      /* Contain layout so re-rendering this tile doesn't trigger reflow
         in sibling tiles. Without this, a width change in lane N causes
         the grid to recompute all 5 columns and every lane shifts. */
      contain: layout style;
    }
    .lane::before {
      /* Top accent bar — tints per source (Bluesky mint, Wikipedia azure) */
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grad-primary);
      opacity: 0.6;
      transition: opacity 0.3s var(--ease-out-quart);
    }
    .lane:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
    }
    .lane:hover::before { opacity: 1; }
    @keyframes lane-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lane-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .lane-name {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .lane-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .lane-stats {
      font-size: 10px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      text-align: right;
      line-height: 1.35;
      font-weight: 600;
      /* Reserve space so digit-count growth (e.g. 999 → 1000 → 10000) doesn't
         push the lane-head layout around. Width fits comfortably up to
         ~9-digit values. */
      min-width: 110px;
      flex-shrink: 0;
    }
    .lane-stats .tx-count { color: var(--accent); }
    .lane-stats .sats-count { color: var(--muted); font-weight: 500; }

    .agent {
      padding: 8px 10px 8px 12px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--border);
      font-size: 11px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      gap: 2px 10px;
      /* Only transition border-color and box-shadow — NOT background.
         Background transitions on rapid active↔done flips caused visible
         "flash" during cycle-active bursts; border/shadow transitions are
         subtle enough to read as "state change" without strobing. */
      transition: border-color 0.25s var(--ease-out-quart),
                  box-shadow 0.25s var(--ease-out-quart);
      position: relative;
    }
    .agent.captain { border-left-color: var(--captain); }
    .agent.worker { border-left-color: var(--worker); }
    .agent.synthesis { border-left-color: var(--synthesis); }
    .agent .role {
      grid-column: 1;
      grid-row: 1;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .agent .role::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
      flex-shrink: 0;
    }
    .agent .role.captain { color: var(--captain); }
    .agent .role.worker { color: var(--worker); }
    .agent .role.synthesis { color: var(--synthesis); }
    .agent .state {
      grid-column: 2;
      grid-row: 1;
      color: var(--text-dim);
      font-size: 10px;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      /* Prevent state text length changes from pushing the sats column.
         Column 2 grabs all free space; text overflow ellipses if too long. */
      min-width: 0;
    }
    .agent .sats {
      grid-column: 3;
      grid-row: 1;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .agent .wallet {
      grid-column: 1 / -1;
      grid-row: 2;
      color: var(--muted-soft);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: right;
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .agent.active {
      background: var(--grad-live);
      border-left-width: 3px;
    }
    .agent.active .role::before {
      animation: dot-pulse 1.5s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 6px currentColor; }
      50% { box-shadow: 0 0 12px currentColor, 0 0 20px currentColor; }
    }
    .agent.done {
      opacity: 0.62;
      background: transparent;
    }
    .agent.done .state { color: var(--muted); }
    .agent.error {
      border-left-color: var(--bad);
      background: rgba(255, 122, 130, 0.08);
    }
    .agent.error .state { color: var(--bad); }

    /* Message-flow visualization */
    .agent.sending {
      animation: sending-pulse 1.4s ease-out;
      position: relative;
    }
    .agent.receiving {
      animation: receiving-pulse 1.4s ease-out;
      position: relative;
    }
    @keyframes sending-pulse {
      0%   { background: rgba(251, 191, 36, 0.28); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); }
      40%  { background: rgba(251, 191, 36, 0.18); box-shadow: 0 0 8px 2px rgba(251, 191, 36, 0.25); }
      100% { background: var(--surface-2); box-shadow: none; }
    }
    @keyframes receiving-pulse {
      0%, 40% { background: var(--surface-2); }
      50% { background: rgba(96, 165, 250, 0.35); box-shadow: 0 0 10px 2px rgba(96, 165, 250, 0.4); }
      100% { background: var(--surface-2); box-shadow: none; }
    }

    /* Message banner that slides in atop a lane when delegate_task fires */
    .msg-banner {
      margin-top: -2px;
      margin-bottom: 2px;
      padding: 6px 10px;
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.15), rgba(96, 165, 250, 0.15));
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 6px;
      font-size: 10px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: banner-flash 8s ease-out forwards;
      pointer-events: none;
    }
    .msg-banner .amt { color: var(--warn); font-weight: 700; font-variant-numeric: tabular-nums; }
    .msg-banner .arrow {
      display: inline-block;
      animation: arrow-fly 1.4s ease-out;
    }
    @keyframes banner-flash {
      0%   { opacity: 0; transform: translateY(-4px); }
      3%   { opacity: 1; transform: translateY(0); }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(0); }
    }

    /* Per-agent dolphin-milk web UI port link. Tiny monospace tag next to
       the role label so the user can click straight into any agent's UI. */
    .agent-port {
      font-family: var(--mono, monospace);
      font-size: 9px;
      color: var(--text-dim, #94a3b8);
      text-decoration: none;
      padding: 1px 4px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 3px;
      margin-left: 4px;
      transition: all 0.12s ease;
    }
    .agent-port:hover {
      color: var(--accent, #60a5fa);
      border-color: var(--accent, #60a5fa);
      background: rgba(96, 165, 250, 0.08);
    }

    /* Persistent per-tile "last delegate ago" indicator. Always visible
       once a delegate has fired, so the tile has continuous context even
       between banner flashes. */
    .last-delegate {
      font-size: 9px;
      color: var(--text-dim);
      padding: 0 2px 2px;
      font-variant-numeric: tabular-nums;
      min-height: 12px;
    }
    .last-delegate:empty { display: none; }

    /* Sidebar Agent Handoffs feed */
    #activity-feed {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      overflow-y: auto;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      padding: 4px 6px;
      background: rgba(148, 163, 184, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-item .icon { flex-shrink: 0; }
    .activity-item .lane-tag {
      font-family: var(--mono, monospace);
      color: var(--accent, #60a5fa);
      font-weight: 600;
      font-size: 9px;
    }
    .activity-item .flow {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .activity-item .amt {
      color: var(--warn);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-size: 9px;
    }
    .activity-item .ago {
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-size: 9px;
      flex-shrink: 0;
    }
    @keyframes arrow-fly {
      0%   { transform: translateX(-12px); opacity: 0; }
      30%  { transform: translateX(0);     opacity: 1; }
      70%  { transform: translateX(12px);  opacity: 1; }
      100% { transform: translateX(20px);  opacity: 0.3; }
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .panel {
      background: var(--grad-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fade-in-up 0.6s 0.3s var(--ease-out-expo) both;
    }
    .panel-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
      flex-shrink: 0;
    }
    .panel-head .count {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 11px;
    }
    .panel-head .tab-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .panel-head .tab {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: all 0.2s var(--ease-out-quart);
    }
    .panel-head .tab:hover {
      color: var(--text-dim);
      background: var(--surface-2);
    }
    .panel-head .tab.active {
      color: var(--accent);
      background: rgba(92, 242, 164, 0.08);
      border-color: rgba(92, 242, 164, 0.25);
    }
    .all-tx-filter {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      background: rgba(10, 14, 26, 0.4);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(8px);
    }
    .all-tx-filter .chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: 0.02em;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .all-tx-filter .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .all-tx-filter .chip.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .all-tx-filter .chip .n {
      font-variant-numeric: tabular-nums;
      opacity: 0.7;
      margin-left: 4px;
    }
    .all-tx-filter .chip.active .n { opacity: 0.9; }
    .panel-body {
      padding: 4px 0;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .tx-item {
      padding: 7px 16px;
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", "Roboto Mono", monospace;
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(35, 43, 69, 0.5);
      animation: tx-flash 0.8s var(--ease-out-quart);
    }
    .tx-item.no-flash { animation: none; }
    .tx-item:hover { background: rgba(92, 242, 164, 0.04); }
    /* Gentle flash — subtle left accent bar fade instead of full-row green.
       Row background stays transparent to prevent the "strobe light" effect
       when many items arrive in quick succession. */
    @keyframes tx-flash {
      0%   { border-left: 2px solid var(--accent); padding-left: 14px; }
      100% { border-left: 2px solid transparent;  padding-left: 16px; }
    }
    .tx-item .txid { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.02em; }
    .tx-item .txid a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
    .tx-item .txid a:hover { color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px; }
    .tx-item .lane-tag {
      color: var(--accent-2);
      font-size: 9px;
      background: var(--surface-3);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      flex-shrink: 0;
      font-family: "Inter", sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }

    .article-section-header {
      padding: 10px 16px 6px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 32, 51, 0.4);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      z-index: 1;
    }
    .article-section-header.live { color: var(--accent); }
    .article-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(35, 43, 69, 0.5);
      transition: background 0.2s;
    }
    .article-item:hover { background: rgba(255, 255, 255, 0.02); }
    .article-item.live {
      border-left: 3px solid var(--accent);
      padding-left: 13px;
      animation: article-in 0.6s var(--ease-out-expo);
    }
    .article-item.historical { opacity: 0.58; }
    .article-item.historical:hover { opacity: 0.85; }
    @keyframes article-in {
      from { opacity: 0; transform: translateX(-10px); background: rgba(92, 242, 164, 0.12); }
      to   { opacity: 1; transform: translateX(0); background: transparent; }
    }
    .article-item a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      transition: color 0.15s;
    }
    .article-item.historical a { color: var(--accent-2); }
    .article-item a:hover { color: var(--text); }
    .article-item .meta {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .article-item .live-badge {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: 0 0 8px rgba(92, 242, 164, 0.35);
    }

    .empty {
      padding: 28px 16px;
      color: var(--muted-soft);
      font-size: 11px;
      text-align: center;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* scrollbar polish */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>DolphinSense <span class="subtitle">Mission Control</span></h1>
    <div class="status-pill" id="status"><span class="dot"></span><span id="status-text">connecting…</span></div>
    <div class="counters">
      <div class="counter primary">
        <div class="num" id="lifetime-txs">0</div>
        <div class="lbl">Lifetime TXs <span id="lifetime-delta" class="delta">+0</span></div>
      </div>
      <div class="counter">
        <div class="num"><span id="tx-rate">0</span><span class="unit">/s</span></div>
        <div class="lbl">Tx Rate <span class="delta" style="opacity:0.5;">30s avg</span></div>
      </div>
      <div class="counter">
        <div class="num" id="lifetime-sats">0</div>
        <div class="lbl">Sats <span id="session-sats" class="delta">+0</span></div>
      </div>
      <div class="counter">
        <div class="num" id="lifetime-articles">0</div>
        <div class="lbl">Articles <span id="session-articles" class="delta">+0</span></div>
      </div>
    </div>
  </header>

  <div class="progress-row">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
      <div class="progress-label">
        <span id="progress-text">0 / 1,500,000</span>
        <span id="progress-pct" class="pct">0.00%</span>
      </div>
    </div>
  </div>

  <div class="feeder-bar" id="feeder-bar">
    <span class="lbl">Feeder:</span>
    <span class="empty" style="padding:0;">waiting for feeder…</span>
  </div>

  <div class="lanes" id="lanes-grid">
    <div class="empty">waiting for lanes…</div>
  </div>

  <div class="right-panel">
    <div class="panel">
      <div class="panel-head">
        <div class="tab-group">
          <button class="tab active" id="tab-live" type="button">Live TX Stream</button>
          <button class="tab" id="tab-all" type="button">All TXs · <span id="all-tx-count">—</span></button>
        </div>
        <span class="count" id="tx-count">0</span>
      </div>
      <div class="panel-body" id="tx-stream">
        <div class="empty">waiting for live txs…</div>
      </div>
      <div class="panel-body" id="all-tx-stream" style="display: none;">
        <div class="empty">loading all txs…</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span>Agent Handoffs</span>
        <span class="count" id="activity-count">0</span>
      </div>
      <div class="panel-body" id="activity-feed">
        <div class="empty">no handoffs yet…</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span>Articles</span>
        <span class="count"><span id="live-article-count">0</span> live · <span id="hist-article-count">0</span> historical</span>
      </div>
      <div class="panel-body" id="article-feed">
        <div class="empty">no articles yet</div>
      </div>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------------
    // Client state
    // ---------------------------------------------------------------
    const state = {
      lanes: new Map(), // laneId → {id, subreddit, agents: {captain: {state, sats, ...}, worker:..., synthesis:...}}
      feederHealth: null,

      // "live" = events received since this browser session opened the SSE
      // connection. Distinct from historical data loaded from disk.
      live: {
        txStream: [],    // rolling, newest first, capped at 100
        articles: [],    // newest first, capped at 20
        txs: 0,
        sats: 0,
        articleCount: 0,
        txTimestamps: [], // ring buffer of Date.now() per proof_emitted
                          // for the rolling tx/s rate counter
      },

      // Rolling list of recent captain → worker delegate handoffs, rendered
      // in the sidebar. Newest first, capped at MAX_ACTIVITY. Fed by
      // pushActivityEntry() from handleMessageFlow, including replay.
      activity: [],

      // "historical" = lifetime data loaded from disk at server start.
      // Populated by init_historical event.
      historical: {
        target: 1500000,
        txs: 0,
        sats: 0,
        articles: 0,
        cycles: 0,
        articlesList: [],
        perLane: {},
        scannedAt: null,
      },
    };

    // ---------------------------------------------------------------
    // Utility
    // ---------------------------------------------------------------
    const fmt = (n) => n.toLocaleString();
    function relativeTime(ts) {
      const secs = Math.floor((Date.now() - ts) / 1000);
      if (secs < 5) return 'just now';
      if (secs < 60) return `${secs}s ago`;
      if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
      return `${Math.floor(secs / 3600)}h ago`;
    }
    const ts = () => new Date().toLocaleTimeString();
    const ago = (tsSec) => {
      if (!tsSec) return '';
      const s = Math.round(Date.now() / 1000 - tsSec);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.round(s / 60)}m ago`;
      return `${Math.round(s / 3600)}h ago`;
    };

    // ---------------------------------------------------------------
    // Lane state update
    // ---------------------------------------------------------------
    function initLane(lane) {
      // Pre-seed agent slots with server_port from the lane config so each
      // tile can render a clickable link to the agent's dolphin-milk web
      // UI ("http://localhost:<port>/ui/"). The lane payload from snap.lanes
      // (or the legacy `init` event) carries an agents[] array with
      // {role, name, server_port}. We hoist server_port up onto the per-role
      // slot so the surgical render can find it via lane.agents[role].port.
      const portByRole = {};
      const nameByRole = {};
      if (Array.isArray(lane.agents)) {
        for (const a of lane.agents) {
          if (a && a.role) {
            portByRole[a.role] = a.server_port;
            nameByRole[a.role] = a.name;
          }
        }
      }
      state.lanes.set(lane.id, {
        id: lane.id,
        subreddit: lane.subreddit,
        agents: {
          captain:   { state: 'idle', sats: 0, proofs: 0, cycle: null, active: false, pulseClass: '', port: portByRole.captain   || null, name: nameByRole.captain   || null },
          worker:    { state: 'idle', sats: 0, proofs: 0, cycle: null, active: false, pulseClass: '', port: portByRole.worker    || null, name: nameByRole.worker    || null },
          synthesis: { state: 'idle', sats: 0, url: null, cycle: null, active: false, pulseClass: '', port: portByRole.synthesis || null, name: nameByRole.synthesis || null },
        },
        totalSats: 0,
        totalTxs: 0,
        banner: null, // {text, amt, id} — short-lived message flow banner
        lastDelegateAt: null, // epoch ms — persistent "last handoff" indicator
      });
    }

    function setAgentState(laneId, role, newState, active = false) {
      const lane = state.lanes.get(laneId);
      if (!lane) return;
      lane.agents[role].state = newState;
      lane.agents[role].active = active;
    }

    // ---------------------------------------------------------------
    // SSE event handlers
    // ---------------------------------------------------------------
    function handleInit(data) {
      state.lanes.clear();
      for (const lane of data.lanes) initLane(lane);
      renderLanes();
    }

    function handleInitHistorical(data) {
      const isRescan = state.historical.scannedAt != null;

      // MONOTONIC FLOOR. The 20s rescan is racy with proof_emitted —
      // the filesystem walk takes 30-150ms during which a worker can
      // flush new txids that the scan either caught or missed. If we
      // blindly zero live.txs after a scan that MISSED a just-flushed
      // batch, the displayed lifetime total drops by N for one tick
      // before the next rescan catches up.
      //
      // Instead of zeroing, compute the absorbed delta: how much did
      // historical grow vs. the previous snapshot? Reduce live.txs by
      // exactly that amount. The display = historical + live is thus
      // guaranteed monotonic even across racy scans.
      const prevHistTxs = state.historical.txs || 0;
      const prevHistSats = state.historical.sats || 0;
      const prevHistArticles = state.historical.articles || 0;
      const newHistTxs = data.txs || 0;
      const newHistSats = data.sats || 0;
      const newHistArticles = data.articles || 0;

      state.historical = {
        target: data.target || 1500000,
        txs: newHistTxs,
        sats: newHistSats,
        articles: newHistArticles,
        cycles: data.cycles || 0,
        articlesList: data.articlesList || [],
        perLane: data.perLane || {},
        scannedAt: data.scannedAt,
      };

      if (isRescan) {
        // Absorbed delta = how many live events got folded into historical
        // by this rescan. Subtract exactly that from live.txs; the rest
        // stays as "uncaptured live" so the display doesn't regress.
        const absorbedTxs = Math.max(0, newHistTxs - prevHistTxs);
        const absorbedSats = Math.max(0, newHistSats - prevHistSats);
        const absorbedArticles = Math.max(0, newHistArticles - prevHistArticles);
        state.live.txs = Math.max(0, state.live.txs - absorbedTxs);
        state.live.sats = Math.max(0, state.live.sats - absorbedSats);
        state.live.articleCount = Math.max(0, state.live.articleCount - absorbedArticles);

        // Don't clear txStream / articles lists — those are bounded and
        // the user wants to see recent activity visually.
        if (typeof appliedCyclesByPath !== 'undefined') {
          appliedCyclesByPath.clear();
        }

        // Per-lane: same monotonic-floor treatment. Compute the absorbed
        // delta per lane against its prior historical snapshot, then
        // reduce lane.totalTxs by that amount.
        for (const lane of state.lanes.values()) {
          const prevLaneTxs = lane.historicalTxs || 0;
          const prevLaneSats = lane.historicalSats || 0;
          const stats = state.historical.perLane[lane.id] || {};
          const newLaneTxs = stats.txs || 0;
          const newLaneSats = stats.sats || 0;
          const absorbedLaneTxs = Math.max(0, newLaneTxs - prevLaneTxs);
          const absorbedLaneSats = Math.max(0, newLaneSats - prevLaneSats);
          lane.totalTxs = Math.max(0, (lane.totalTxs || 0) - absorbedLaneTxs);
          lane.totalSats = Math.max(0, (lane.totalSats || 0) - absorbedLaneSats);
          lane.historicalTxs = newLaneTxs;
          lane.historicalSats = newLaneSats;
        }
      } else {
        // Initial load — just seed per-lane historical, no absorb logic.
        for (const [laneId, stats] of Object.entries(state.historical.perLane)) {
          const lane = state.lanes.get(laneId);
          if (lane) {
            lane.historicalTxs = stats.txs || 0;
            lane.historicalSats = stats.sats || 0;
          }
        }
      }
      renderTotals();
      renderProgress();
      renderArticles();
      renderLanes();
    }

    function handleFeederHealth(data) {
      state.feederHealth = data;
      renderFeeder();
    }

    // Per-agent wallet balance + UTXO count. Stored on the lane.agents[role]
    // object and rendered by renderLanes(). Updated every ~25s.
    function handleWalletHealth(updates) {
      for (const u of updates) {
        const lane = state.lanes.get(u.lane);
        if (!lane) continue;
        const agent = lane.agents[u.role];
        if (!agent) continue;
        agent.walletSats = u.sats;
        agent.walletUtxos = u.utxos;
      }
      renderLanes();
    }

    function handleAgentEvent(laneId, role, ev) {
      const lane = state.lanes.get(laneId);
      if (!lane) return;
      const agent = lane.agents[role];
      if (!agent) return;

      switch (ev.type) {
        case 'session_start':
          agent.state = 'starting';
          agent.active = true;
          agent.sats = 0;
          break;
        case 'think_request':
          agent.state = 'thinking…';
          agent.active = true;
          break;
        case 'think_response':
          if (ev.sats_effective) agent.sats += ev.sats_effective;
          if (ev.finish_reason === 'tool_calls' && ev.tool_calls && ev.tool_calls.length) {
            const names = ev.tool_calls.map((tc) => tc.function && tc.function.name).filter(Boolean);
            agent.state = `→ ${names.join(' + ')}`;
          } else {
            agent.state = 'responded';
          }
          agent.active = true;
          break;
        case 'tool_call':
          agent.state = `running ${ev.name}`;
          agent.active = true;
          break;
        case 'tool_result':
          if (ev.name === 'overlay_lookup') agent.state = `✓ overlay (${ev.success ? 'ok' : 'err'})`;
          else if (ev.name === 'delegate_task') agent.state = `✓ delegated`;
          else if (ev.name === 'execute_bash') agent.state = `✓ ran bash`;
          else if (ev.name === 'upload_to_nanostore') {
            const content = typeof ev.content === 'string' ? ev.content : '';
            const urlMatch = content.match(/https:\/\/storage\.googleapis\.com\/prod-uhrp\/cdn\/[A-Za-z0-9]+/);
            if (urlMatch) {
              agent.state = `✓ uploaded`;
              agent.url = urlMatch[0];
            } else {
              agent.state = `✓ ${ev.name}`;
            }
          } else if (ev.name === 'file_read') agent.state = `✓ read file`;
          else agent.state = `✓ ${ev.name}`;
          break;
        case 'session_end': {
          // Max-iterations isn't a failure for parallel-mode captains — it's
          // the intended completion shape (iter 1 = delegate, iter 2 = wrap).
          // Same for workers and synthesis agents that run to their declared
          // ceiling. Detect the iteration-limit signal and display it as a
          // successful "cycle complete" so the UI doesn't look like an error.
          const errStr = String(ev.error || '');
          const isIterLimit = /iter|iteration/i.test(errStr)
            && /max|limit|reached|exceed/i.test(errStr);
          if (ev.error && !isIterLimit) {
            agent.state = `✗ ${errStr.slice(0, 40)}`;
          } else if (isIterLimit) {
            agent.state = `✓ cycle complete`;
          } else {
            agent.state = `✓ cycle complete`;
          }
          agent.sats = ev.sats_spent || agent.sats;
          agent.active = false;
          break;
        }
        case 'error':
          agent.state = `✗ ${(ev.error || '').slice(0, 40)}`;
          agent.active = false;
          break;
      }
      renderLanes();
    }

    function handleProofEmitted(ev) {
      // Replayed events (from the server's recentTxs ring buffer on SSE
      // connect) are ALREADY counted in historical.perLane — they come
      // from files the historical scan already walked. Don't increment
      // live counters or the rolling rate window, or we double-count
      // and appear to "drop" on the next rescan. But DO populate the
      // stream panel and per-lane totals via historical, not live.
      if (ev._replay) {
        state.live.txStream.unshift({ txid: ev.txid, lane: ev.lane, ts: Date.now() / 1000 });
        if (state.live.txStream.length > 100) state.live.txStream.length = 100;
        prependTxItem(ev);
        return;
      }
      state.live.txs += 1;
      state.live.txStream.unshift({ txid: ev.txid, lane: ev.lane, ts: Date.now() / 1000 });
      if (state.live.txStream.length > 100) state.live.txStream.length = 100;
      // Rolling 30s window for tx/s rate. Prune on insert.
      const now = Date.now();
      state.live.txTimestamps.push(now);
      const cutoff = now - 30_000;
      while (state.live.txTimestamps.length > 0 && state.live.txTimestamps[0] < cutoff) {
        state.live.txTimestamps.shift();
      }
      const lane = state.lanes.get(ev.lane);
      if (lane) lane.totalTxs += 1;
      // Surgical tx stream update — ONE new node, no full rebuild.
      prependTxItem(ev);
      // Update the small header count via textContent (fast, no flicker).
      const txCountEl = document.getElementById('tx-count');
      if (txCountEl) txCountEl.textContent = fmt(state.live.txs);
      // Schedule light counter updates (totals + progress bar width).
      renderTotals();
      renderProgress();
      // Don't schedule renderTxStream — the surgical prepend above handled it.
      // Don't schedule renderLanes on every proof — the hash-dedup catches
      // identical states, but we still pay the hash computation cost. The
      // periodic heavy render timer will pick up tx-count drift within 1s.
    }

    // Tracks which cycle indices we've already applied per aggregate source.
    // Key is `${lane}:${cycle_dir}`, value is Set of cycleIdx that have been
    // counted. This makes handleCycleAggregate idempotent — incremental
    // aggregate.json writes (which now happen after every cycle, not only
    // at end-of-run) re-broadcast the same cycles[] array growing over time,
    // and we must only apply NEW cycles[i], not re-apply everything.
    const appliedCyclesByPath = new Map();

    function handleCycleAggregate(ev) {
      const lane = state.lanes.get(ev.lane);
      if (!lane) return;
      const cycles = (ev.data && ev.data.cycles) || [];
      if (cycles.length === 0) return;
      const key = `${ev.lane}:${ev.cycle_dir}`;
      let applied = appliedCyclesByPath.get(key);
      if (!applied) { applied = new Set(); appliedCyclesByPath.set(key, applied); }
      let newArticleCount = 0;
      for (const cycle of cycles) {
        if (cycle.error) continue;
        const idx = cycle.cycleIdx != null ? cycle.cycleIdx : cycles.indexOf(cycle);
        if (applied.has(idx)) continue; // already counted
        applied.add(idx);
        lane.totalSats += cycle.totalSats || 0;
        state.live.sats += cycle.totalSats || 0;
        if (cycle.nanostoreUrl) {
          state.live.articles.unshift({
            lane: ev.lane,
            url: cycle.nanostoreUrl,
            txidsUrl: cycle.txidsUrl,
            proofs: cycle.proofsCreated || 0,
            cycleIdx: idx,
            ts: Date.now() / 1000,
          });
          if (state.live.articles.length > 20) state.live.articles.length = 20;
          state.live.articleCount += 1;
          newArticleCount += 1;
        }
      }
      renderTotals();
      renderProgress();
      renderLanes();
      if (newArticleCount > 0) renderArticles();
    }

    function handleFeederEvent(ev) {
      // feeder scrape_start / scrape_done / error events — we just refresh
      // via the periodic health.json snapshot, so this is mostly a no-op.
    }

    // Inter-agent message visualization. `phase` is 'sending' (captain
    // fired delegate_task), 'confirmed' (captain got commission_id back),
    // or 'received' (worker's session started — picked up the commission).
    function handleMessageFlow(ev) {
      const lane = state.lanes.get(ev.lane);
      if (!lane) return;

      // Always update the persistent "last delegate" timestamp so the per-
      // tile indicator has something to render even when no banner is live.
      // Replayed events use their original ts so the "Xs ago" is accurate.
      const ts = ev.ts || Date.now();
      if (ev.phase === 'sending' || ev.phase === 'confirmed') {
        if (!lane.lastDelegateAt || ts > lane.lastDelegateAt) {
          lane.lastDelegateAt = ts;
        }
      }

      // Push into the activity feed (capped at 30). Replayed events go in
      // too, so fresh page loads have immediate history.
      pushActivityEntry(ev);

      // Replayed events skip the pulse + banner animation — they're
      // historical and would be misleading as "live" indicators. But the
      // lastDelegateAt + activity feed updates above already happened.
      if (ev._replay) {
        renderLanes();
        return;
      }

      if (ev.phase === 'sending') {
        lane.agents.captain.pulseClass = 'sending';
        lane.banner = {
          text: `${ev.from} → ${ev.to}`,
          tool: ev.tool,
          amt: null,
          id: Date.now(),
        };
        setTimeout(() => {
          const l = state.lanes.get(ev.lane);
          if (l) { l.agents.captain.pulseClass = ''; renderLanes(); }
        }, 2500);
      } else if (ev.phase === 'confirmed') {
        if (lane.banner && ev.amount_sats) {
          lane.banner.amt = ev.amount_sats;
          lane.banner.commission_id = ev.commission_id;
        }
      } else if (ev.phase === 'received') {
        lane.agents.worker.pulseClass = 'receiving';
        setTimeout(() => {
          const l = state.lanes.get(ev.lane);
          if (l) { l.agents.worker.pulseClass = ''; renderLanes(); }
        }, 2500);
        // Banner stays up ~8s so it's actually catchable by a human eye.
        setTimeout(() => {
          const l = state.lanes.get(ev.lane);
          if (l) { l.banner = null; renderLanes(); }
        }, 8000);
      }
      renderLanes();
    }

    // Activity feed — a small rolling list of the most recent delegate
    // handoffs. Rendered in the sidebar so the user always has SOMETHING
    // to look at between sparse live events.
    const MAX_ACTIVITY = 30;
    function pushActivityEntry(ev) {
      if (!state.activity) state.activity = [];
      // Coalesce consecutive events for the same (lane, phase) within 2s
      // to avoid duplicate entries from sending+confirmed firing together.
      const last = state.activity[0];
      if (last && last.lane === ev.lane && last.phase === ev.phase &&
          Math.abs((ev.ts || Date.now()) - last.ts) < 2000) {
        // Upgrade with amount_sats if available
        if (ev.amount_sats) last.amount_sats = ev.amount_sats;
        renderDirty.activity = true;
        scheduleRender();
        return;
      }
      state.activity.unshift({
        lane: ev.lane,
        phase: ev.phase,
        from_name: ev.from_name,
        to_name: ev.to_name,
        amount_sats: ev.amount_sats || null,
        ts: ev.ts || Date.now(),
      });
      if (state.activity.length > MAX_ACTIVITY) {
        state.activity.length = MAX_ACTIVITY;
      }
      renderDirty.activity = true;
      scheduleRender();
    }

    // ---------------------------------------------------------------
    // Rendering — two-tier throttle:
    //
    //   LIGHT renders (totals, progress, txStream) — RAF-batched,
    //   run at most once per animation frame (max 60 Hz). These only
    //   touch small text nodes or a single element's style width,
    //   so they don't interrupt CSS animations.
    //
    //   HEAVY renders (lanes, articles, feeder) — interval-throttled
    //   to max once per 500ms (2 Hz). These rebuild entire grid
    //   innerHTML, which tears down DOM nodes and interrupts in-flight
    //   CSS transitions/animations. Running them 60 Hz causes a
    //   full-screen flicker during proof_emitted bursts. Throttling
    //   to 2 Hz eliminates the flicker while keeping updates feeling
    //   live enough for a ~5-minute cycle cadence.
    // ---------------------------------------------------------------
    // Single-tier render batching — everything runs at RAF speed.
    //
    // Historical note: we previously had a two-tier split where "heavy"
    // renders (lanes, articles, feeder) were throttled to 1 Hz because
    // they did `grid.innerHTML = ...` teardown-rebuild which caused
    // flicker at high event rates. We've since replaced that with
    // surgical DOM updates (querySelector + textContent + classList.
    // toggle), which have effectively zero visual cost. The throttle is
    // now pure latency — it was making the UI feel sluggish for no
    // rendering benefit. Demoted to RAF coalescing = up to 60 Hz visual
    // response, flicker-free because DOM nodes never get torn down.
    const renderDirty = {
      totals: false, progress: false, lanes: false,
      txStream: false, articles: false, feeder: false, activity: false,
    };
    let rafPending = 0;
    // Kept for the lane tile dedup inside doRenderLanes — not used for
    // render scheduling anymore.
    let lastLanesHash = '';

    function flushRenders() {
      rafPending = 0;
      // Order: cheap → expensive. Lanes last because surgical update
      // loops every tile.
      if (renderDirty.totals)   { renderDirty.totals   = false; doRenderTotals(); }
      if (renderDirty.progress) { renderDirty.progress = false; doRenderProgress(); }
      if (renderDirty.txStream) { renderDirty.txStream = false; doRenderTxStream(); }
      if (renderDirty.articles) { renderDirty.articles = false; doRenderArticles(); }
      if (renderDirty.feeder)   { renderDirty.feeder   = false; doRenderFeeder(); }
      if (renderDirty.activity) { renderDirty.activity = false; doRenderActivity(); }
      if (renderDirty.lanes)    { renderDirty.lanes    = false; doRenderLanes(); }
    }
    function scheduleRender() {
      if (rafPending) return;
      rafPending = requestAnimationFrame(flushRenders);
    }
    function renderTotals()   { renderDirty.totals   = true; scheduleRender(); }
    function renderProgress() { renderDirty.progress = true; scheduleRender(); }
    function renderTxStream() { renderDirty.txStream = true; scheduleRender(); }
    function renderLanes()    { renderDirty.lanes    = true; scheduleRender(); }
    function renderArticles() { renderDirty.articles = true; scheduleRender(); }
    function renderFeeder()   { renderDirty.feeder   = true; scheduleRender(); }

    function doRenderTotals() {
      const lifetimeTxs = state.historical.txs + state.live.txs;
      const lifetimeSats = state.historical.sats + state.live.sats;
      const lifetimeArticles = state.historical.articles + state.live.articleCount;
      document.getElementById('lifetime-txs').textContent = fmt(lifetimeTxs);
      document.getElementById('lifetime-sats').textContent = fmt(lifetimeSats);
      document.getElementById('lifetime-articles').textContent = fmt(lifetimeArticles);
      document.getElementById('lifetime-delta').textContent = state.live.txs > 0 ? `+${fmt(state.live.txs)} live` : '+0';
      document.getElementById('session-sats').textContent = state.live.sats > 0 ? `+${fmt(state.live.sats)} live` : '+0';
      // Tx/s — rolling 30s window. Prune stale timestamps before computing.
      const now = Date.now();
      const cutoff = now - 30_000;
      while (state.live.txTimestamps.length > 0 && state.live.txTimestamps[0] < cutoff) {
        state.live.txTimestamps.shift();
      }
      const rateEl = document.getElementById('tx-rate');
      if (rateEl) {
        const windowMs = state.live.txTimestamps.length > 1
          ? Math.min(30_000, now - state.live.txTimestamps[0]) : 1;
        const rate = state.live.txTimestamps.length > 0
          ? (state.live.txTimestamps.length / (windowMs / 1000)) : 0;
        rateEl.textContent = rate >= 10 ? rate.toFixed(0) : rate.toFixed(1);
      }
      document.getElementById('session-articles').textContent = state.live.articleCount > 0 ? `+${fmt(state.live.articleCount)} live` : '+0';
    }

    function doRenderProgress() {
      const lifetimeTxs = state.historical.txs + state.live.txs;
      const target = state.historical.target || 1500000;
      const pct = Math.min(100, (lifetimeTxs / target) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${fmt(lifetimeTxs)} / ${fmt(target)}`;
      document.getElementById('progress-pct').textContent = pct.toFixed(pct < 1 ? 3 : 2) + '%';
    }

    // Surgical lane rendering. Philosophy:
    //
    //   1. Build tile DOM ONCE per lane on first render. Never re-run
    //      innerHTML on the lanes-grid container after that. Every full
    //      innerHTML rebuild destroys all child nodes and briefly leaves
    //      the grid empty — that's the "cards disappear/reappear" flash.
    //
    //   2. On subsequent updates, find the existing tile by data-lane-id
    //      and mutate specific text nodes via textContent. No teardown,
    //      no node recreation, no layout thrash.
    //
    //   3. Structural changes (banner appear/disappear, agent class
    //      active/done/error transitions) update CLASS lists and add/
    //      remove specific child nodes — but never rebuild the tile.
    //
    // Performance: updating a text node costs one style/layout invalidation.
    // Rebuilding innerHTML costs N × (parse HTML, allocate nodes, attach,
    // compute styles, layout, paint). On a 15-agent grid at 1 Hz, the
    // difference is night and day.
    function doRenderLanes() {
      const grid = document.getElementById('lanes-grid');
      const lanes = Array.from(state.lanes.values());
      if (lanes.length === 0) {
        if (!grid.querySelector('.empty')) grid.innerHTML = '<div class="empty">waiting for lanes…</div>';
        return;
      }
      // If the grid is empty or showing the waiting state, build the tiles
      // for the first time. This is the ONLY place we do innerHTML on the
      // grid container.
      const existing = grid.querySelectorAll('.lane[data-lane-id]');
      if (existing.length !== lanes.length) {
        grid.innerHTML = lanes.map((lane) => buildLaneTileHtml(lane)).join('');
      }
      // Now surgically update every tile. This is idempotent and cheap.
      for (const lane of lanes) updateLaneTileSurgical(lane);
    }

    function buildLaneTileHtml(lane) {
      // Static scaffold. All mutable text nodes get explicit data-field attrs
      // so updateLaneTileSurgical() can find them with a single querySelector.
      // Banner area is a permanent placeholder div that gets populated when
      // a message flow fires.
      const prefix = lane.display_prefix || (lane.source === 'reddit' ? 'r/' : '');
      return `
        <div class="lane" data-lane-id="${lane.id}">
          <div class="lane-head">
            <div>
              <div class="lane-name">${lane.id}</div>
              <div class="lane-sub">${prefix}${lane.subreddit}</div>
            </div>
            <div class="lane-stats">
              <div><span class="tx-count" data-field="tx-count">0</span> tx <span class="live-delta" data-field="tx-live"></span></div>
              <div class="sats-count" data-field="sats-count">0 sats</div>
            </div>
          </div>
          <div class="banner-slot" data-field="banner-slot"></div>
          <div class="last-delegate" data-field="last-delegate" title="most recent captain → worker delegate"></div>
          ${['captain', 'worker', 'synthesis'].map((role) => {
            const a = lane.agents[role] || {};
            const port = a.port;
            const portLink = port
              ? `<a class="agent-port" href="http://localhost:${port}/ui/" target="_blank" rel="noopener" title="open ${role} dolphin-milk UI">:${port}↗</a>`
              : '';
            return `
            <div class="agent ${role}" data-role="${role}">
              <div><span class="role ${role}">${role}</span> ${portLink}</div>
              <div class="state" data-field="state">idle</div>
              <div class="sats" data-field="agent-sats"></div>
              <div class="wallet" data-field="wallet" title="wallet balance · utxo count"></div>
            </div>
          `;}).join('')}
        </div>
      `;
    }

    function updateLaneTileSurgical(lane) {
      const tile = document.querySelector(`.lane[data-lane-id="${lane.id}"]`);
      if (!tile) return;

      // Stats block — tx count + sats count
      const laneLifetimeTxs = (lane.historicalTxs || 0) + (lane.totalTxs || 0);
      const laneLifetimeSats = (lane.historicalSats || 0) + (lane.totalSats || 0);
      setText(tile, 'tx-count', fmt(laneLifetimeTxs));
      setText(tile, 'sats-count', `${fmt(laneLifetimeSats)} sats`);
      const liveDelta = tile.querySelector('[data-field="tx-live"]');
      if (liveDelta) {
        liveDelta.textContent = lane.totalTxs > 0 ? `+${fmt(lane.totalTxs)}` : '';
      }

      // Persistent "last delegate ago" indicator. Updated every render
      // (which includes the 1 Hz ticker below) so the number keeps ticking
      // even when no event has arrived since the last frame.
      if (lane.lastDelegateAt) {
        setText(tile, 'last-delegate', `📨 last delegate: ${relativeTime(lane.lastDelegateAt)}`);
      } else {
        setText(tile, 'last-delegate', '');
      }

      // Banner slot — add/remove the message flow banner without touching
      // the rest of the tile.
      const slot = tile.querySelector('[data-field="banner-slot"]');
      if (slot) {
        if (lane.banner) {
          const existingBanner = slot.querySelector('.msg-banner');
          const bannerId = existingBanner && existingBanner.getAttribute('data-banner-id');
          if (bannerId !== String(lane.banner.id)) {
            slot.innerHTML = `
              <div class="msg-banner" data-banner-id="${lane.banner.id}">
                📨 <strong>${lane.banner.text}</strong>
                <span class="arrow">→</span>
                ${lane.banner.tool || ''}
                ${lane.banner.amt ? `<span class="amt">${fmt(lane.banner.amt)} sats</span>` : ''}
              </div>
            `;
          }
        } else if (slot.childElementCount > 0) {
          slot.innerHTML = '';
        }
      }

      // Per-agent updates
      for (const role of ['captain', 'worker', 'synthesis']) {
        const a = lane.agents[role];
        const agentEl = tile.querySelector(`.agent[data-role="${role}"]`);
        if (!agentEl || !a) continue;
        // Class transitions — only touch classList if membership changed.
        toggleClass(agentEl, 'active', !!a.active);
        toggleClass(agentEl, 'error',  !!(a.state && a.state.startsWith('✗')));
        toggleClass(agentEl, 'done',   !!(a.state && a.state.startsWith('✓ done')));
        toggleClass(agentEl, 'sending',   a.pulseClass === 'sending');
        toggleClass(agentEl, 'receiving', a.pulseClass === 'receiving');
        // Text content — only change if different.
        setText(agentEl, 'state', a.state || 'idle');
        setText(agentEl, 'agent-sats', a.sats ? fmt(a.sats) : '');
        const walletText = (a.walletSats != null) ? `💰 ${fmt(a.walletSats)} · ${a.walletUtxos || 0}u` : '';
        setText(agentEl, 'wallet', walletText);
      }
    }

    // Tiny helpers to minimize DOM writes — only touch a node if its text
    // or class state actually changed. Avoids unnecessary style recalc.
    function setText(root, field, value) {
      const el = root.querySelector(`[data-field="${field}"]`);
      if (el && el.textContent !== value) el.textContent = value;
    }
    function toggleClass(el, cls, on) {
      if (el.classList.contains(cls) !== on) el.classList.toggle(cls, on);
    }

    function doRenderActivity() {
      const el = document.getElementById('activity-feed');
      const countEl = document.getElementById('activity-count');
      if (!el) return;
      const items = state.activity || [];
      if (countEl) countEl.textContent = fmt(items.length);
      if (items.length === 0) {
        if (!el.querySelector('.empty')) {
          el.innerHTML = '<div class="empty">no handoffs yet…</div>';
        }
        return;
      }
      // Cheap full rebuild — capped at 30 items, single panel, doesn't
      // animate per-item like the tx stream does.
      el.innerHTML = items.map((a) => {
        const phaseIcon = a.phase === 'sending' ? '📤'
          : a.phase === 'confirmed' ? '✅'
          : a.phase === 'received' ? '📥'
          : '•';
        const amt = a.amount_sats ? ` <span class="amt">${fmt(a.amount_sats)} sats</span>` : '';
        return `
          <div class="activity-item" data-ts="${a.ts}">
            <span class="icon">${phaseIcon}</span>
            <span class="lane-tag">${a.lane}</span>
            <span class="flow">${a.from_name || a.from || 'captain'} → ${a.to_name || a.to || 'worker'}</span>
            ${amt}
            <span class="ago">${relativeTime(a.ts)}</span>
          </div>
        `;
      }).join('');
    }

    function doRenderFeeder() {
      const bar = document.getElementById('feeder-bar');
      const h = state.feederHealth;
      if (!h || !h.perSub) {
        bar.innerHTML = '<span class="lbl">Feeder:</span><span class="empty" style="padding:0;">waiting…</span>';
        return;
      }
      const subs = Object.entries(h.perSub);
      bar.innerHTML = `
        <span class="lbl">Feeder (${h.uptimeSec || 0}s):</span>
        ${subs.map(([name, s]) => `
          <span class="sub">
            <span class="name">${name}</span>
            <span class="rate">${s.ratePerMin != null ? s.ratePerMin.toFixed(1) : '?'}/min</span>
            <span class="queued">Q ${s.totalQueued || 0}</span>
          </span>
        `).join('')}
      `;
    }

    // Surgical tx stream updater. PROBLEM: re-running innerHTML on every
    // proof_emitted destroys all 100 child nodes and recreates them,
    // restarting every item's CSS `tx-flash` keyframe animation. At
    // 20+ events/sec × 100 items × 1.2s animation = continuous green
    // strobe across the whole panel. Eye-searing.
    //
    // FIX: `renderTxStream()` now just updates the header count. New
    // items are inserted one-at-a-time by `prependTxItem()` from the
    // proof_emitted handler — no rebuild of existing items, no
    // re-animation. Old items drop off the bottom when we exceed 100.
    //
    // Full rebuild happens ONLY on the "empty → populated" transition
    // and the initial paint from a stale session.
    function doRenderTxStream() {
      const el = document.getElementById('tx-stream');
      document.getElementById('tx-count').textContent = fmt(state.live.txs);
      if (state.live.txStream.length === 0) {
        el.innerHTML = '<div class="empty">waiting for live txs…</div>';
        return;
      }
      // First time switching from empty → populated, paint the current buffer
      // without animation (so the initial batch doesn't strobe).
      if (el.querySelector('.empty') || el.childElementCount === 0) {
        el.innerHTML = state.live.txStream.map((tx) => `
          <div class="tx-item no-flash">
            <span class="lane-tag">${tx.lane}</span>
            <span class="txid"><a href="https://whatsonchain.com/tx/${tx.txid}" target="_blank" rel="noopener">${tx.txid.slice(0, 10)}…${tx.txid.slice(-8)}</a></span>
          </div>
        `).join('');
      }
      // Otherwise: no-op. New items arrive via prependTxItem() surgically.
    }

    function prependTxItem(ev) {
      const el = document.getElementById('tx-stream');
      if (!el) return;
      // Strip the empty state if present
      const emptyChild = el.querySelector('.empty');
      if (emptyChild) emptyChild.remove();
      // Build one new tx node — only this one gets the flash animation.
      const node = document.createElement('div');
      node.className = 'tx-item';
      node.innerHTML = `
        <span class="lane-tag">${ev.lane}</span>
        <span class="txid"><a href="https://whatsonchain.com/tx/${ev.txid}" target="_blank" rel="noopener">${ev.txid.slice(0, 10)}…${ev.txid.slice(-8)}</a></span>
      `;
      el.insertBefore(node, el.firstChild);
      // Cap at 100 items — remove the oldest (last child) if over budget.
      while (el.childElementCount > 100) {
        el.removeChild(el.lastElementChild);
      }
    }

    function doRenderArticles() {
      const el = document.getElementById('article-feed');
      document.getElementById('live-article-count').textContent = fmt(state.live.articleCount);
      document.getElementById('hist-article-count').textContent = fmt(state.historical.articles);

      const live = state.live.articles;
      const historical = state.historical.articlesList || [];

      if (live.length === 0 && historical.length === 0) {
        el.innerHTML = '<div class="empty">no articles yet</div>';
        return;
      }

      const liveHtml = live.length > 0 ? `
        <div class="article-section-header live">🟢 Live (this session)</div>
        ${live.map((a) => `
          <div class="article-item live">
            <a href="${a.url}" target="_blank" rel="noopener"><span class="live-badge">LIVE</span>📰 ${a.lane} — ${a.proofs} proofs cited</a>
            <div class="meta">${ago(a.ts)} · <a href="${a.txidsUrl || '#'}" target="_blank" style="color:var(--muted);">txids manifest</a></div>
          </div>
        `).join('')}
      ` : '';

      const histHtml = historical.length > 0 ? `
        <div class="article-section-header">📚 Historical (${historical.length})</div>
        ${historical.slice(0, 50).map((a) => `
          <div class="article-item historical">
            <a href="${a.url}" target="_blank" rel="noopener">📰 ${a.lane} — ${a.proofs} proofs cited</a>
            <div class="meta">${a.cycleDir ? a.cycleDir.replace('cycle-', '') : 'historical'} · <a href="${a.txidsUrl || '#'}" target="_blank" style="color:var(--muted);">txids manifest</a></div>
          </div>
        `).join('')}
      ` : '';

      el.innerHTML = liveHtml + histHtml;
    }

    // ---------------------------------------------------------------
    // "All TXs" view — fetches /api/txs and renders a scrollable list
    // with per-lane filter chips. Paginated to 500 per fetch. Tabs
    // swap the visible panel-body inside the Live TX Stream panel.
    // ---------------------------------------------------------------
    const allTxView = {
      loaded: false,
      selectedLane: null,     // null = all lanes
      offset: 0,
      pageSize: 500,
      total: 0,
      byLaneCounts: {},
      rows: [],
      loading: false,
    };

    async function fetchAllTxs(reset = false) {
      if (allTxView.loading) return;
      allTxView.loading = true;
      if (reset) {
        allTxView.offset = 0;
        allTxView.rows = [];
      }
      const params = new URLSearchParams();
      if (allTxView.selectedLane) params.set('lane', allTxView.selectedLane);
      params.set('offset', String(allTxView.offset));
      params.set('limit', String(allTxView.pageSize));
      try {
        const r = await fetch('/api/txs?' + params.toString());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        allTxView.total = j.total;
        allTxView.byLaneCounts = j.byLaneCounts || {};
        for (const entry of (j.txs || [])) allTxView.rows.push(entry);
        allTxView.offset += (j.txs || []).length;
        allTxView.loaded = true;
        renderAllTxsView();
      } catch (e) {
        const el = document.getElementById('all-tx-stream');
        el.innerHTML = `<div class="empty">error: ${e.message}</div>`;
      } finally {
        allTxView.loading = false;
      }
    }

    function renderAllTxsView() {
      const el = document.getElementById('all-tx-stream');
      // Update the tab counter badge
      const total = Object.values(allTxView.byLaneCounts).reduce((a, b) => a + b, 0);
      document.getElementById('all-tx-count').textContent = fmt(total);
      // Build filter chips
      const lanes = Object.keys(allTxView.byLaneCounts).sort();
      const chips = [
        `<button class="chip ${!allTxView.selectedLane ? 'active' : ''}" data-lane="">all<span class="n">${fmt(total)}</span></button>`,
        ...lanes.map((lid) => `
          <button class="chip ${allTxView.selectedLane === lid ? 'active' : ''}" data-lane="${lid}">
            ${lid}<span class="n">${fmt(allTxView.byLaneCounts[lid])}</span>
          </button>
        `),
      ].join('');
      const shown = allTxView.rows.length;
      const moreHint = shown < allTxView.total
        ? `<div class="empty" id="load-more-row" style="cursor:pointer;padding:14px;">▾ load next 500 (${fmt(allTxView.total - shown)} remaining)</div>`
        : (allTxView.total === 0
            ? '<div class="empty">no txs on disk yet</div>'
            : `<div class="empty">— end of list (${fmt(shown)}/${fmt(allTxView.total)}) —</div>`);
      el.innerHTML = `
        <div class="all-tx-filter">${chips}</div>
        ${allTxView.rows.map((e) => `
          <div class="tx-item">
            <span class="lane-tag">${e.lane}</span>
            <span class="txid"><a href="https://whatsonchain.com/tx/${e.txid}" target="_blank" rel="noopener">${e.txid.slice(0, 10)}…${e.txid.slice(-8)}</a></span>
          </div>
        `).join('')}
        ${moreHint}
      `;
      // Wire up chip click handlers
      for (const chip of el.querySelectorAll('.chip')) {
        chip.addEventListener('click', () => {
          const lane = chip.getAttribute('data-lane');
          allTxView.selectedLane = lane || null;
          fetchAllTxs(true);
        });
      }
      const more = document.getElementById('load-more-row');
      if (more) more.addEventListener('click', () => fetchAllTxs(false));
    }

    function setupTabs() {
      const tabLive = document.getElementById('tab-live');
      const tabAll = document.getElementById('tab-all');
      const liveBody = document.getElementById('tx-stream');
      const allBody = document.getElementById('all-tx-stream');
      const txCount = document.getElementById('tx-count');
      tabLive.addEventListener('click', () => {
        tabLive.classList.add('active');
        tabAll.classList.remove('active');
        liveBody.style.display = '';
        allBody.style.display = 'none';
        txCount.style.display = '';
      });
      tabAll.addEventListener('click', () => {
        tabAll.classList.add('active');
        tabLive.classList.remove('active');
        liveBody.style.display = 'none';
        allBody.style.display = '';
        txCount.style.display = 'none';
        if (!allTxView.loaded) fetchAllTxs(true);
      });
    }

    // ---------------------------------------------------------------
    // Snapshot mode — server-authoritative single-source-of-truth.
    // Gated by ?v=snapshot query flag for A/B validation. Once flipped
    // to default, the legacy event handlers (handleInitHistorical,
    // handleProofEmitted, handleCycleAggregate, handleAgentEvent merge
    // logic) can be deleted.
    //
    // Contract: server sends one kind:'snapshot' event on connect, and
    // another on every debounced (150ms) state change. Client stores
    // the most recent snapshot and renders surgically. No local
    // reducers. No merge. No double-count. No drops.
    // ---------------------------------------------------------------
    // Default = snapshot (server-authoritative). Legacy event-merge path
    // reachable via ?v=legacy for emergency fallback. Will be deleted
    // after the next live soak proves snapshot-mode under load.
    const USE_SNAPSHOT_MODE = new URLSearchParams(location.search).get('v') !== 'legacy';
    let latestSnapshot = null;

    function applySnapshot(snap) {
      latestSnapshot = snap;

      // Seed lanes if empty (first snapshot acts as init replacement)
      if (state.lanes.size === 0 && Array.isArray(snap.lanes)) {
        for (const l of snap.lanes) initLane(l);
      }

      // Totals — authoritative from snap.totals (derived from set union)
      state.historical.txs = snap.totals.txs;
      state.historical.sats = snap.totals.sats;
      state.historical.articles = snap.totals.articles;
      state.historical.cycles = snap.totals.cycles;
      state.historical.target = snap.target;
      state.live.txs = 0;
      state.live.sats = 0;
      state.live.articleCount = 0;

      // Per-lane — authoritative. Everything lives in snap.perLane[laneId].
      for (const [laneId, lane] of state.lanes.entries()) {
        const p = snap.perLane[laneId];
        if (!p) continue;
        lane.historicalTxs = p.txs;
        lane.historicalSats = p.sats;
        lane.totalTxs = 0;
        lane.totalSats = 0;
        lane.lastDelegateAt = p.lastDelegateAt;
        // Agent states
        for (const role of ['captain', 'worker', 'synthesis']) {
          const srcAgent = p.agents && p.agents[role];
          const dstAgent = lane.agents[role];
          if (srcAgent && dstAgent) {
            dstAgent.state = srcAgent.state || 'idle';
            dstAgent.active = !!srcAgent.active;
            if (srcAgent.sats != null) dstAgent.sats = srcAgent.sats;
          }
        }
      }

      // Wallet health — snap.walletHealth is {"lane:role": {sats, utxos}}
      for (const [key, w] of Object.entries(snap.walletHealth || {})) {
        const [laneId, role] = key.split(':');
        const lane = state.lanes.get(laneId);
        if (!lane) continue;
        const agent = lane.agents[role];
        if (!agent) continue;
        agent.walletSats = w.sats;
        agent.walletUtxos = w.utxos;
      }

      // Tx stream — replace the stream list with snap.recentTxs
      // (newest first). Client just renders it; no increments.
      state.live.txStream = (snap.recentTxs || []).map((t) => ({
        txid: t.txid,
        lane: t.lane,
        ts: t.ts / 1000,
      }));

      // Activity feed — replace with snap.recentFlows
      state.activity = (snap.recentFlows || []).map((f) => ({
        lane: f.lane,
